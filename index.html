<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Khảo Sát Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-light p-3">

<div class="card shadow p-4" style="max-width: 1000px; margin: auto;">
    <h4 class="text-center text-primary mb-4">PHIẾU KHẢO SÁT THIẾT BỊ CNTT (ĐẦY ĐỦ)</h4>
    <form id="surveyForm">
        <div class="row g-2">
            <div class="col-md-4"><input type="text" id="dept" placeholder="Bộ phận" class="form-control" required></div>
            <div class="col-md-4"><input type="text" id="user" placeholder="Người sử dụng" class="form-control" required></div>
            <div class="col-md-4"><input type="number" id="qty" placeholder="Số lượng" class="form-control" value="1" required></div>
            <div class="col-12"><input type="text" id="device" placeholder="Tên thiết bị" class="form-control" required></div>
            <div class="col-12"><textarea id="specs" placeholder="Cấu hình chi tiết" class="form-control" rows="2"></textarea></div>
            <div class="col-md-3"><select id="os" class="form-select"><option>Windows 10</option><option>Windows 11</option></select></div>
            <div class="col-md-3"><select id="os_license" class="form-select"><option>Có bản quyền</option><option>Chưa có</option></select></div>
            <div class="col-md-3"><select id="office" class="form-select"><option>Office 2019</option><option>Office 365</option></select></div>
            <div class="col-md-3"><select id="office_license" class="form-select"><option>Có bản quyền</option><option>Chưa có</option></select></div>
            <div class="col-12"><input type="text" id="others" placeholder="Phần mềm khác (MISA, ASIA...)" class="form-control"></div>
            <div class="col-12"><textarea id="note" placeholder="Đề xuất / Kiến nghị" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary mt-3">Lưu thông tin</button>
        </div>
    </form>

    <hr>
    <button onclick="exportToExcel()" class="btn btn-success mb-3">Xuất báo cáo chuẩn Hành chính</button>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr><th>Người dùng</th><th>SL</th><th>Thiết bị</th><th>HĐH</th><th>Office</th><th>Phần mềm</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const supabase = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function loadData() {
        const { data, error } = await supabase.from('survey_devices').select('*');
        if (error) { console.error("Lỗi tải dữ liệu:", error); return; }
        
        let html = "";
        data.forEach(row => {
            html += `<tr>
                <td>${row.full_name || ''}</td>
                <td>${row.quantity || 1}</td>
                <td>${row.device_name || ''}</td>
                <td>${row.os || ''}</td>
                <td>${row.office_version || ''}</td>
                <td>${row.other_software || ''}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteRow(${row.id})">Xóa</button></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            quantity: parseInt(document.getElementById('qty').value),
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value + " (" + document.getElementById('os_license').value + ")",
            office_version: document.getElementById('office').value + " (" + document.getElementById('office_license').value + ")",
            other_software: document.getElementById('others').value,
            suggestions: document.getElementById('note').value
        };
        const { error } = await supabase.from('survey_devices').insert([data]);
        if(error) alert("Lỗi: " + error.message);
        else { alert("Đã lưu thành công!"); loadData(); }
    };

    async function deleteRow(id) {
        await supabase.from('survey_devices').delete().eq('id', id);
        loadData();
    }

    async function exportToExcel() {
        const { data } = await supabase.from('survey_devices').select('*');
        if(!data || data.length === 0) return alert("Chưa có dữ liệu!");
        
        // Tạo file với header chuẩn
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Bao_Cao_Tong_Hop.xlsx");
    }

    loadData();
</script>
</body>
</html>
