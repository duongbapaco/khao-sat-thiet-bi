<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Khảo sát & Thống kê Trang thiết bị Công nghệ</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #0056b3;
            font-size: 24px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        .header p {
            margin: 5px 0;
            color: #666;
            font-style: italic;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #444;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            height: 80px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #0056b3;
            outline: none;
            box-shadow: 0 0 5px rgba(0,86,179,0.2);
        }
        .row {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
        .col {
            display: table-cell;
            padding-right: 15px;
        }
        .col:last-child {
            padding-right: 0;
        }
        .btn-submit {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #004085;
        }
        
        /* Table Preview Styles */
        .preview-section {
            margin-top: 40px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
        .preview-title {
            font-size: 18px;
            color: #0056b3;
            margin-bottom: 15px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 13px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .action-btns {
            margin-top: 20px;
            text-align: right;
        }
        .btn-export {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn-export:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PHIẾU KHẢO SÁT TRANG THIẾT BỊ CÔNG NGHỆ</h1>
        <p>Vui lòng điền đầy đủ và chính xác thông tin thiết bị của đơn vị/phòng ban</p>
    </div>

    <form id="surveyForm">
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="department">Bộ phận / Phòng ban <span style="color:red;">*</span></label>
                    <select id="department" required>
                        <option value="">-- Chọn Bộ phận --</option>
                        <option value="Phòng Hành chính - Nhân sự">Phòng Hành chính - Nhân sự</option>
                        <option value="Phòng Kế toán">Phòng Kế toán</option>
                        <option value="Phòng Kinh doanh">Phòng Kinh doanh</option>
                        <option value="Phòng Kỹ thuật / IT">Phòng Kỹ thuật / IT</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="user">Người sử dụng <span style="color:red;">*</span></label>
                    <input type="text" id="user" placeholder="Nguyễn Văn A" required>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="deviceName">Tên thiết bị <span style="color:red;">*</span></label>
                    <select id="deviceName" required>
                        <option value="">-- Chọn loại thiết bị --</option>
                        <option value="Máy tính để bàn (PC)">Máy tính để bàn (PC)</option>
                        <option value="Máy tính xách tay (Laptop)">Máy tính xách tay (Laptop)</option>
                        <option value="Máy in / Máy Photocopy">Máy in / Máy Photocopy</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="quantity">Số lượng <span style="color:red;">*</span></label>
                    <input type="number" id="quantity" min="1" value="1" required>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="config">Cấu hình chi tiết <span style="color:red;">*</span></label>
            <textarea id="config" placeholder="Ví dụ: Core i5-11400, RAM 16GB, SSD 512GB, Màn hình 24 inch" required></textarea>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="os">Hệ điều hành</label>
                    <select id="os">
                        <option value="Windows 10">Windows 10</option>
                        <option value="Windows 11">Windows 11</option>
                        <option value="macOS">macOS</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="office">Phần mềm Office</label>
                    <input type="text" id="office" value="Microsoft Office 2021" placeholder="Ví dụ: Office 2019, Microsoft 365...">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="otherSoftware">Phần mềm khác</label>
            <input type="text" id="otherSoftware" placeholder="Ví dụ: Photoshop, AutoCAD, MISA...">
        </div>

        <div class="form-group">
            <label for="proposal">Đề xuất / Kiến nghị (nếu có)</label>
            <textarea id="proposal" placeholder="Ví dụ: Máy chậm cần nâng cấp thêm RAM, Đề xuất thay pin laptop..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Thêm vào bảng thống kê</button>
    </form>

    <div class="preview-section">
        <div class="preview-title">Dữ liệu đã thu thập (Xem trước)</div>
        <div style="overflow-x:auto;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th style="width: 5%;">STT</th>
                        <th>Người sử dụng</th>
                        <th>Bộ phận</th>
                        <th>Tên thiết bị</th>
                        <th>Cấu hình</th>
                        <th>Hệ điều hành</th>
                        <th>Office</th>
                        <th>Phần mềm khác</th>
                        <th style="width: 8%;">SL</th>
                        <th>Đề xuất</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dữ liệu động sẽ chèn vào đây -->
                </tbody>
            </table>
        </div>
        
        <div class="action-btns">
            <button class="btn-export" onclick="exportToAdminDoc()">Xuất Báo cáo Văn bản Hành chính (PDF/HTML)</button>
        </div>
    </div>
</div>

<script>
    const dataList = [];
    const form = document.getElementById('surveyForm');
    const tableBody = document.querySelector('#dataTable tbody');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const record = {
            stt: dataList.length + 1,
            user: document.getElementById('user').value,
            dept: document.getElementById('department').value,
            device: document.getElementById('deviceName').value,
            config: document.getElementById('config').value,
            os: document.getElementById('os').value,
            office: document.getElementById('office').value,
            other: document.getElementById('otherSoftware').value || '-',
            qty: document.getElementById('quantity').value,
            proposal: document.getElementById('proposal').value || 'Không có'
        };

        dataList.push(record);
        renderTable();
        form.reset();
        document.getElementById('quantity').value = 1;
    });

    function renderTable() {
        tableBody.innerHTML = '';
        dataList.forEach((item, index) => {
            item.stt = index + 1;
            const row = `<tr>
                <td>${item.stt}</td>
                <td><b>${item.user}</b></td>
                <td>${item.dept}</td>
                <td>${item.device}</td>
                <td>${item.config}</td>
                <td>${item.os}</td>
                <td>${item.office}</td>
                <td>${item.other}</td>
                <td>${item.qty}</td>
                <td>${item.proposal}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function exportToAdminDoc() {
        if(dataList.length === 0) {
            alert('Vui lòng nhập ít nhất một bản ghi dữ liệu trước khi xuất báo cáo!');
            return;
        }

        let tableRowsHtml = '';
        dataList.forEach(item => {
            tableRowsHtml += `
                <tr style="page-break-inside: avoid;">
                    <td style="border: 1px solid #000; padding: 6px; text-align: center;">${item.stt}</td>
                    <td style="border: 1px solid #000; padding: 6px;">${item.user}</td>
                    <td style="border: 1px solid #000; padding: 6px;">${item.dept}</td>
                    <td style="border: 1px solid #000; padding: 6px;">${item.device}</td>
                    <td style="border: 1px solid #000; padding: 6px; font-size: 11pt;">${item.config}</td>
                    <td style="border: 1px solid #000; padding: 6px; text-align: center;">${item.os}</td>
                    <td style="border: 1px solid #000; padding: 6px; text-align: center;">${item.office}</td>
                    <td style="border: 1px solid #000; padding: 6px;">${item.other}</td>
                    <td style="border: 1px solid #000; padding: 6px; text-align: center;">${item.qty}</td>
                    <td style="border: 1px solid #000; padding: 6px;">${item.proposal}</td>
                </tr>
            `;
        });

        const reportHtml = `<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Báo cáo hành chính</title>
    <style>
        @page { size: A4; margin: 20mm 15mm 20mm 20mm; }
        body { font-family: "Times New Roman", Times, serif; font-size: 13pt; line-height: 1.4; color: #000; margin: 0; padding: 0; }
        .co-quan { text-align: center; font-weight: bold; font-size: 12pt; text-transform: uppercase; }
        .tieu-ngu { text-align: center; font-weight: bold; font-size: 12pt; }
        .tieu-ngu .gach-chan { width: 140px; height: 1px; background: #000; margin: 4px auto; }
        .co-quan .gach-chan { width: 80px; height: 1px; background: #000; margin: 4px auto; }
        .title-section { text-align: center; margin-top: 30px; margin-bottom: 25px; }
        .title-section h2 { font-size: 15pt; font-weight: bold; margin: 0 0 5px 0; text-transform: uppercase; }
        .title-section p { font-style: italic; margin: 0; font-size: 12pt; }
        .signature-table { width: 100%; border: none; margin-top: 40px; }
        .signature-table td { border: none; text-align: center; width: 50%; font-size: 12pt; vertical-align: top;}
    </style>
</head>
<body>
    <table style="width:100%; border:none; margin-bottom: 20px;">
        <tr>
            <td class="co-quan" style="width:45%; vertical-align:top; border:none; text-align:center;">
                CÔNG TY CÔNG NGHỆ XYZ<br>
                <span style="font-weight:normal;">Số: ......./BC-XYZ</span>
                <div class="gach-chan"></div>
            </td>
            <td class="tieu-ngu" style="width:55%; vertical-align:top; border:none; text-align:center;">
                CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM<br>
                <span style="font-size:13pt;">Độc lập - Tự do - Hạnh phúc</span>
                <div class="gach-chan"></div>
                <p style="font-weight:normal; font-style:italic; font-size:12pt; margin-top:10px;">Hà Nội, ngày .... tháng .... năm 2026</p>
            </td>
        </tr>
    </table>

    <div class="title-section">
        <h2>BÁO CÁO</h2>
        <h2>Tổng hợp tình hình trang thiết bị công nghệ thông tin</h2>
        <p>(Kèm theo Công văn số: ....../XYZ-IT)</p>
    </div>

    <p style="text-align: justify; text-indent: 1cm; margin-bottom: 15px;">Thực hiện kế hoạch rà soát, nâng cấp hạ tầng công nghệ định kỳ phục vụ hoạt động vận hành và nâng cao hiệu suất làm việc của cán bộ nhân viên, Phòng Kỹ thuật / IT xin báo cáo tổng hợp dữ liệu khảo sát trang thiết bị công nghệ thông tin từ các đơn vị phòng ban chi tiết như sau:</p>

    <table style="width: 100%; border-collapse: collapse; font-size: 11pt; margin-top: 15px;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="border: 1px solid #000; padding: 6px; text-align: center; width: 4%;">STT</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Người sử dụng</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Bộ phận</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Tên thiết bị</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center; width: 25%;">Cấu hình</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Hệ điều hành</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Office</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Phần mềm khác</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center; width: 5%;">SL</th>
                <th style="border: 1px solid #000; padding: 6px; text-align: center;">Đề xuất / Kiến nghị</th>
            </tr>
        </thead>
        <tbody>
            ${tableRowsHtml}
        </tbody>
    </table>

    <p style="text-align: justify; text-indent: 1cm; margin-top: 20px;">Kính trình Ban Giám đốc xem xét và phê duyệt phương án nâng cấp, sửa chữa đối với các thiết bị có kiến nghị từ các đơn vị để đảm bảo tiến độ công việc chung.</p>

    <table class="signature-table">
        <tr>
            <td>
                <b>Nơi nhận:</b><br>
                <span style="font-size:11pt; font-style:italic; display:block; text-align:left; margin-left:20px;">
                    - Ban Giám đốc (để b/c);<br>
                    - Các phòng ban;<br>
                    - Lưu: VT, IT.
                </span>
            </td>
            <td>
                <b>NGƯỜI LẬP BÁO CÁO</b><br>
                <span style="font-style:italic; font-size:11pt; color:#555;">(Ký, ghi rõ họ tên)</span>
                <br><br><br><br><br>
                <b>Phòng Kỹ thuật / IT</b>
            </td>
        </tr>
    </table>
</body>
</html>`;

        const blob = new Blob([reportHtml], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Bao_Cao_Hanh_Chinh_Thiet_Bi.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
